<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spherical Snake</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "react": "https://esm.sh/react@18.3.1?dev",
                "react-dom": "https://esm.sh/react-dom@18.3.1?dev",
                "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
                "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
                "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime?dev",
                "remotion": "https://esm.sh/remotion@4.0.350?external=react,react-dom&dev",
                "@remotion/player": "https://esm.sh/@remotion/player@4.0.350?external=react,react-dom&dev",
                "@websim/remotion/player": "https://esm.websim.com/@websim/remotion/player"
            }
        }
    </script>
</head>
<body>
    <div id="loading-screen">
        <canvas id="loader-canvas"></canvas>
    </div>
    <div id="black-fade"></div>
    <div id="game-container"></div>
    <div id="replay-container" class="hidden">
        <div id="replay-root"></div>
        <button id="close-replay">Close Replay</button>
    </div>
    <div id="ui-layer">
        <button id="mute-toggle" aria-label="Toggle sound">🔊</button>
        <div id="player-card">
            <div id="player-identity">
                <div class="avatar-wrapper">
                    <img id="player-avatar" src="" alt="Avatar">
                    <div id="planet-diameter-badge">20</div>
                </div>
                <div id="player-name">Player</div>
            </div>
            <div id="player-score">0</div>
        </div>
        <div id="start-message">Tap to Direct Snake</div>
        <div id="game-over" class="hidden">
            <h1>Game Over</h1>
            <div id="game-over-buttons">
                <button id="btn-restart">Retry</button>
                <button id="btn-replay">Instant Replay</button>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
    <!-- Preload critical modules -->
    <link rel="modulepreload" href="./island-geometry.js">

</html>
